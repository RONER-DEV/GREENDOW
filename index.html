<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Custom Cursor Embed</title>
<style>
  :root {
    /* ── TWEAK THESE TO RESIZE THE IMAGE ── */
    --img-width: 80%;
    --img-max-width: 1100px;
    --img-height: auto;
    /* ─────────────────────────────────────── */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: transparent !important;
    width: 100%;
    height: 100%;
    overflow: hidden;
    /* Custom cursor — applies to the whole iframe area.
       Replace "cursor.png" with your file name if different.
       The two numbers (16 16) are the click hotspot. */
    cursor: url('https://dochub.com/joconnor-83x4bw/4DeM0oWKm2gq2yzVXyLgP3/spraybottle-png-removebg-preview-png') 16 16, auto;
  }
  *, *:hover, a, button {
    cursor: url('https://dochub.com/joconnor-83x4bw/4DeM0oWKm2gq2yzVXyLgP3/spraybottle-png-removebg-preview-png') 16 16, auto !important;
  }
  .stage {
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .product-img {
    width: var(--img-width);
    max-width: var(--img-max-width);
    height: var(--img-height);
    object-fit: contain;
    display: block;
    opacity: 0;
    transform: translateX(-120%);
    transition: opacity 1.4s cubic-bezier(0.22, 1, 0.36, 1),
                transform 1.4s cubic-bezier(0.22, 1, 0.36, 1);
    will-change: transform, opacity;
  }
  .stage.in-view .product-img {
    opacity: 1;
    transform: translateX(0);
  }
  @media (prefers-reduced-motion: reduce) {
    .product-img { transition: none; opacity: 1; transform: none; }
  }
</style>
</head>
<body>
  <div class="stage" id="stage">
    <!-- Replace "product.png" with your image file name, or delete this line if you don't want an image -->
    <img class="product-img" src="product.png" alt="">
  </div>

<script>
  const stage = document.getElementById('stage');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) stage.classList.add('in-view');
      else stage.classList.remove('in-view');
    });
  }, { threshold: 0.25 });
  observer.observe(stage);
</script>
</body>
</html>
